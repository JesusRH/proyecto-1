<div class="min-h-screen bg-gray-100 p-6">

  <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-xl overflow-hidden">

    <!-- Encabezado -->
    <div class="bg-blue-700 p-4 text-white flex justify-between items-center">
      <h2 class="text-xl font-bold uppercase tracking-wider">Registro de Unidad</h2>
      <div class="text-right">
        <span class="text-xs block opacity-80 text-blue-200">Folio Sistema</span>
        <span class="font-mono text-lg font-bold"># {{ folioActual }}</span>
      </div>
    </div>

    <!-- Formulario -->
    <form [formGroup]="unidadForm" (ngSubmit)="guardarUnidad()" class="p-6 space-y-8">

      <!-- Sección Datos del Tracto -->
      <section>
        <div class="flex items-center border-b border-gray-200 pb-2 mb-4">
          <span class="bg-blue-100 text-blue-700 p-2 rounded-full mr-3 text-sm font-bold">01</span>
          <h3 class="text-lg font-semibold text-gray-700 uppercase">Datos del Tractocamión</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex flex-col">
            <label class="text-xs font-semibold text-gray-500 mb-1 uppercase">Modelo</label>
            <input type="text" formControlName="modelo" class="w-full bg-gray-50 border border-gray-300 text-gray-700 rounded-lg p-2.5">
          </div>
          <div class="flex flex-col">
            <label class="text-xs font-semibold text-gray-500 mb-1 uppercase">Color</label>
            <input type="text" formControlName="color" class="w-full bg-gray-50 border border-gray-300 text-gray-700 rounded-lg p-2.5">
          </div>
          <div class="flex flex-col">
            <label class="text-xs font-semibold text-gray-500 mb-1 uppercase">Placa del Tracto</label>
            <input type="text" formControlName="placaTracto" class="w-full bg-gray-50 border border-gray-300 text-gray-800 font-bold rounded-lg p-2.5">
          </div>
        </div>
      </section>

      <!-- Sección Datos del Operador -->
      <section>
        <div class="flex items-center border-b border-gray-200 pb-2 mb-4">
          <span class="bg-green-100 text-green-700 p-2 rounded-full mr-3 text-sm font-bold">02</span>
          <h3 class="text-lg font-semibold text-gray-700 uppercase">Datos del Operador</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex flex-col">
            <label class="text-xs font-semibold text-gray-500 mb-1 uppercase">Nombre Completo</label>
            <input type="text" formControlName="operador" class="w-full bg-gray-50 border border-gray-300 text-gray-900 font-semibold rounded-lg p-2.5">
          </div>
          <div class="flex flex-col">
            <label class="text-xs font-semibold text-gray-500 mb-1 uppercase">Teléfono</label>
            <input type="tel" formControlName="telefono" class="w-full bg-gray-50 border border-gray-300 text-gray-900 font-mono rounded-lg p-2.5">
          </div>
        </div>
      </section>

      <!-- Botón -->
      <div class="pt-4">
        <button type="submit" [disabled]="unidadForm.invalid || isPosting()" 
          class="w-full bg-blue-700 hover:bg-blue-800 disabled:bg-gray-400 text-white font-bold py-5 rounded-xl shadow-xl transition-all uppercase tracking-widest text-lg">
          {{ isPosting() ? 'Guardando...' : 'Registrar Unidad' }}
        </button>
      </div>

    </form>
  </div>
</div>
